<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Career sequence – drag and drop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #f5f3ef;
      padding: 28px 16px 48px;
    }
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .page-header p {
      font-size: 13px;
      color: #999;
    }

    /* SOURCE BANK */
    .bank-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }
    .bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
      border: 1.5px solid #e0dbd0;
      min-height: 110px;
    }

    .drag-card {
      width: 100px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      cursor: grab;
      border: 2px solid #ddd;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      user-select: none;
    }
    .drag-card:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    .drag-card img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    .drag-card.dragging { opacity: 0.4; cursor: grabbing; }

    /* DROP ZONES */
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .slot-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .slot-number {
      width: 24px; height: 24px;
      background: #1a1a2e;
      color: white;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .drop-slot {
      width: 100%;
      aspect-ratio: 5/4;
      border-radius: 10px;
      border: 2.5px dashed #c8c0b0;
      background: #faf8f4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
      position: relative;
    }
    .drop-slot.drag-over { border-color: #7c5cbf; background: #f0eaff; }
    .drop-slot.filled { border-style: solid; border-color: #7c5cbf; }
    .drop-slot.correct { border-color: #2ecc71; background: #f0fff6; }
    .drop-slot.wrong { border-color: #e74c3c; background: #fff5f5; }

    .drop-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .slot-placeholder {
      font-size: 11px;
      color: #ccc;
      text-align: center;
      padding: 4px;
    }

    .slot-label {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      line-height: 1.4;
      font-style: italic;
    }

    /* FEEDBACK badge inside slot */
    .slot-badge {
      position: absolute;
      top: 6px; right: 6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
    }
    .drop-slot.correct .slot-badge { display: flex; background: #2ecc71; }
    .drop-slot.wrong .slot-badge   { display: flex; background: #e74c3c; }

    /* BUTTONS */
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
    }
    .btn {
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-check { background: #7c5cbf; color: white; }
    .btn-reset { background: #e8e0f5; color: #7c5cbf; }

    /* SCORE */
    .score-msg {
      text-align: center;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a2e;
      min-height: 24px;
    }

    @media (max-width: 600px) {
      .slots-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Josef's career – put the images in the right order</h1>
  <p>Drag each image to the correct position in the career sequence</p>
</div>

<div class="bank-title">Images to place</div>
<div class="bank" id="bank"></div>

<div class="slots-grid" id="slots-grid"></div>

<div class="btn-row">
  <button class="btn btn-check" onclick="checkAnswers()">Check answers</button>
  <button class="btn btn-reset" onclick="resetAll()">Reset</button>
</div>
<div class="score-msg" id="score-msg"></div>

const SEQUENCE = [
  { id: 'applied',     label: 'applied for a job' },
  { id: 'shortlisted', label: 'was short-listed for' },
  { id: 'interview',   label: 'interview' },
  { id: 'offered',     label: 'was offered a position as' },
  { id: 'hired',       label: 'was hired by' },
  { id: 'appointed',   label: 'was appointed' },
  { id: 'sabbatical',  label: 'took a sabbatical' },
  { id: 'resigned',    label: 'resigned from' },
  { id: 'newjob',      label: 'found a new job' },
  { id: 'retired',     label: 'retired' },
];

let dragging = null;
let dragSource = null; // 'bank' or slot index

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildBank() {
  const bank = document.getElementById('bank');
  bank.innerHTML = '';
  const shuffled = shuffle(SEQUENCE);
  shuffled.forEach(item => {
    const card = makeCard(item.id);
    bank.appendChild(card);
  });
}

function makeCard(id) {
  const card = document.createElement('div');
  card.className = 'drag-card';
  card.dataset.id = id;
  card.draggable = true;
  card.innerHTML = `<img src="${IMG_DATA[id]}" alt="${id}"/>`;

  card.addEventListener('dragstart', e => {
    dragging = id;
    dragSource = card.closest('#bank') ? 'bank' : parseInt(card.closest('.drop-slot').dataset.index);
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragging = null;
    dragSource = null;
  });

  // Touch support
  card.addEventListener('touchstart', onTouchStart, {passive: true});
  card.addEventListener('touchmove', onTouchMove, {passive: false});
  card.addEventListener('touchend', onTouchEnd);

  return card;
}

function buildSlots() {
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = '';
  SEQUENCE.forEach((item, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'slot-wrap';

    const num = document.createElement('div');
    num.className = 'slot-number';
    num.textContent = i + 1;

    const slot = document.createElement('div');
    slot.className = 'drop-slot';
    slot.dataset.index = i;
    slot.dataset.correct = item.id;
    slot.innerHTML = `<div class="slot-placeholder">drop here</div><div class="slot-badge"></div>`;

    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      dropIntoSlot(slot, i);
    });

    const label = document.createElement('div');
    label.className = 'slot-label';
    label.textContent = item.label;

    wrap.appendChild(num);
    wrap.appendChild(slot);
    wrap.appendChild(label);
    grid.appendChild(wrap);
  });
}

function dropIntoSlot(slot, slotIndex) {
  if (!dragging) return;

  const existing = slot.querySelector('.drag-card');

  // If slot already has a card, send it back to bank
  if (existing) {
    document.getElementById('bank').appendChild(existing);
  }

  // If dragging from another slot, clear that slot
  if (typeof dragSource === 'number' && dragSource !== slotIndex) {
    const prevSlot = document.querySelector(`.drop-slot[data-index="${dragSource}"]`);
    if (prevSlot) {
      const prevCard = prevSlot.querySelector('.drag-card');
      if (prevCard) prevSlot.removeChild(prevCard);
      prevSlot.classList.remove('filled', 'correct', 'wrong');
      if (!prevSlot.querySelector('.slot-placeholder')) {
        const ph = document.createElement('div');
        ph.className = 'slot-placeholder';
        ph.textContent = 'drop here';
        prevSlot.insertBefore(ph, prevSlot.firstChild);
      }
    }
  }

  // Place card in slot
  const card = document.querySelector(`.drag-card[data-id="${dragging}"]`);
  if (!card) return;

  const ph = slot.querySelector('.slot-placeholder');
  if (ph) ph.remove();

  slot.classList.add('filled');
  slot.classList.remove('correct', 'wrong');
  slot.insertBefore(card, slot.querySelector('.slot-badge'));

  document.getElementById('score-msg').textContent = '';
}

function checkAnswers() {
  const slots = document.querySelectorAll('.drop-slot');
  let correct = 0;
  let filled = 0;
  slots.forEach(slot => {
    const card = slot.querySelector('.drag-card');
    slot.classList.remove('correct', 'wrong');
    const badge = slot.querySelector('.slot-badge');
    if (card) {
      filled++;
      if (card.dataset.id === slot.dataset.correct) {
        slot.classList.add('correct');
        badge.textContent = '✓';
        correct++;
      } else {
        slot.classList.add('wrong');
        badge.textContent = '✗';
      }
    }
  });
  if (filled < 10) {
    document.getElementById('score-msg').textContent = `Place all images before checking! (${filled}/10 placed)`;
  } else if (correct === 10) {
    document.getElementById('score-msg').textContent = '🎉 Perfect! All 10 in the right order.';
  } else {
    document.getElementById('score-msg').textContent = `${correct} out of 10 correct. Try moving the wrong ones!`;
  }
}

function resetAll() {
  buildBank();
  buildSlots();
  document.getElementById('score-msg').textContent = '';
}

// --- Touch support ---
let touchCard = null;
let touchClone = null;
let touchOrigin = null;

function onTouchStart(e) {
  touchCard = e.currentTarget;
  dragging = touchCard.dataset.id;
  dragSource = touchCard.closest('#bank') ? 'bank' : parseInt(touchCard.closest('.drop-slot')?.dataset.index ?? -1);
  const rect = touchCard.getBoundingClientRect();
  touchClone = touchCard.cloneNode(true);
  touchClone.style.cssText = `position:fixed;width:${rect.width}px;height:${rect.height}px;opacity:0.8;pointer-events:none;z-index:9999;border-radius:8px;overflow:hidden;`;
  document.body.appendChild(touchClone);
}

function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (touchClone) {
    touchClone.style.left = (t.clientX - 50) + 'px';
    touchClone.style.top  = (t.clientY - 40) + 'px';
  }
}

function onTouchEnd(e) {
  if (touchClone) { document.body.removeChild(touchClone); touchClone = null; }
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const slot = el?.closest('.drop-slot');
  if (slot) {
    dropIntoSlot(slot, parseInt(slot.dataset.index));
  }
  dragging = null;
  dragSource = null;
  touchCard = null;
}

buildBank();
buildSlots();
</script>
</body>
</html>
